name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: batuser
          POSTGRES_PASSWORD: batpassword
          POSTGRES_DB: batdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_DRIVER: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: batuser
      DB_PASSWORD: batpassword
      DB_NAME: batdb
      REDIS_ADDRESS: localhost:6379
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -race -count=1 -timeout=120s

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m

  # ── Integration tests ────────────────────────────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: batuser
          POSTGRES_PASSWORD: batpassword
          POSTGRES_DB: batdb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DB_URL: postgres://batuser:batpassword@localhost:5433/batdb_test?sslmode=disable
      TEST_REDIS_ADDR: localhost:6380

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Integration tests
        run: go test -tags=integration ./internal/audit/... ./internal/auth/... -race -count=1 -timeout=120s -v

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --build tsconfig.app.json --noEmit

      - name: Lint
        run: pnpm exec eslint src --max-warnings=0

      - name: Build
        run: pnpm run build
        env:
          VITE_API_URL: ""
