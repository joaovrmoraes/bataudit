name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:

  # ── Detect changed paths (only on workflow_run, not tag push) ────────────────
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      landing:  ${{ steps.filter.outputs.landing }}
      docs:     ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'internal/**'
            frontend:
              - 'frontend/**'
            landing:
              - 'landing/**'
            docs:
              - 'docs-site/**'

  # ── Build & push Docker images (backend or frontend changed, or tag push) ────
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
        (needs.detect-changes.result == 'success' &&
         (needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'))
      )
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: writer
            dockerfile: cmd/api/writer/Dockerfile
          - service: reader
            dockerfile: cmd/api/reader/Dockerfile
          - service: worker
            dockerfile: cmd/api/worker/Dockerfile
          - service: seeder
            dockerfile: cmd/tools/seed/Dockerfile
          - service: seed-anomalies
            dockerfile: cmd/tools/seed-anomalies/Dockerfile
          - service: seed-stream
            dockerfile: cmd/tools/seed-stream/Dockerfile
          - service: demo-reset
            dockerfile: cmd/tools/demo-reset/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy app (demo) — only after Docker images are built ───────────────────
  deploy-app:
    name: Deploy app to Coolify
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    environment: main
    env:
      WEBHOOK_DEMO: ${{ secrets.COOLIFY_WEBHOOK_DEMO }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - name: Trigger Coolify - demo
        if: env.WEBHOOK_DEMO != ''
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$WEBHOOK_DEMO" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"

  # ── Deploy static sites — independent of Docker build ────────────────────────
  deploy-static:
    name: Deploy static sites to Coolify
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
        (needs.detect-changes.result == 'success' &&
         (needs.detect-changes.outputs.landing == 'true' || needs.detect-changes.outputs.docs == 'true'))
      )
    environment: main
    env:
      WEBHOOK_LANDING: ${{ secrets.COOLIFY_WEBHOOK_LANDING }}
      WEBHOOK_DOCS:    ${{ secrets.COOLIFY_WEBHOOK_DOCS }}
      COOLIFY_TOKEN:   ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - name: Trigger Coolify - landing
        if: |
          env.WEBHOOK_LANDING != '' && (
            (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
            needs.detect-changes.outputs.landing == 'true'
          )
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$WEBHOOK_LANDING" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"

      - name: Trigger Coolify - docs
        if: |
          env.WEBHOOK_DOCS != '' && (
            (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
            needs.detect-changes.outputs.docs == 'true'
          )
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "$WEBHOOK_DOCS" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
