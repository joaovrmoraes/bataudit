## BatAudit — Slim / Resource-constrained test
##
## Simulates a 0.5 vCPU / 500 MB host (t3.micro, Fly.io shared-cpu-1x, etc.)
## Services start sequentially via depends_on: service_healthy.
##
## Usage:
##   Pre-built images (default):
##     docker compose -f docker-compose.slim.yml up
##
##   Build from source:
##     docker compose -f docker-compose.slim.yml up --build
##
## Requires .env — copy from .env.example and adjust values.

version: '3.8'

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: bitnami/postgresql:latest
    container_name: bat_slim_postgres
    environment:
      - POSTGRESQL_USERNAME=${DB_USER:-batuser}
      - POSTGRESQL_PASSWORD=${DB_PASSWORD:-batpassword}
      - POSTGRESQL_DATABASE=${DB_NAME:-batdb}
    volumes:
      - slim_postgres_data:/bitnami/postgresql
    networks:
      - bataudit-slim
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-batuser} -d ${DB_NAME:-batdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 192M

  redis:
    image: redis:alpine
    container_name: bat_slim_redis
    networks:
      - bataudit-slim
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 64M

  # ── BatAudit services ────────────────────────────────────────────────────────

  writer:
    image: ghcr.io/joaovrmoraes/bataudit/writer:latest
    build:
      context: .
      dockerfile: cmd/api/writer/Dockerfile
    container_name: bat_slim_writer
    pull_policy: missing
    environment:
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-batuser}
      - DB_PASSWORD=${DB_PASSWORD:-batpassword}
      - DB_NAME=${DB_NAME:-batdb}
      - REDIS_ADDRESS=redis:6379
      - GIN_MODE=${GIN_MODE:-release}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure:3
    networks:
      - bataudit-slim
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.08"
          memory: 80M

  reader:
    image: ghcr.io/joaovrmoraes/bataudit/reader:latest
    build:
      context: .
      dockerfile: cmd/api/reader/Dockerfile
    container_name: bat_slim_reader
    pull_policy: missing
    environment:
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-batuser}
      - DB_PASSWORD=${DB_PASSWORD:-batpassword}
      - DB_NAME=${DB_NAME:-batdb}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - GIN_MODE=${GIN_MODE:-release}
      - API_READER_PORT=8082
      - INITIAL_OWNER_NAME=${INITIAL_OWNER_NAME:-Admin}
      - INITIAL_OWNER_EMAIL=${INITIAL_OWNER_EMAIL:-admin@bataudit.local}
      - INITIAL_OWNER_PASSWORD=${INITIAL_OWNER_PASSWORD:-admin123}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      writer:
        condition: service_healthy
    restart: on-failure:3
    networks:
      - bataudit-slim
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.08"
          memory: 80M

  worker:
    image: ghcr.io/joaovrmoraes/bataudit/worker:latest
    build:
      context: .
      dockerfile: cmd/api/worker/Dockerfile
    container_name: bat_slim_worker
    pull_policy: missing
    environment:
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-batuser}
      - DB_PASSWORD=${DB_PASSWORD:-batpassword}
      - DB_NAME=${DB_NAME:-batdb}
      - REDIS_ADDRESS=redis:6379
      - WORKER_INITIAL_COUNT=2
      - WORKER_MIN_COUNT=2
      - WORKER_MAX_COUNT=4
      - ENABLE_AUTOSCALING=true
      - SCALE_UP_THRESHOLD=5
      - SCALE_DOWN_THRESHOLD=1
      - WORKER_SCALE_FACTOR=1.5
      - COOLDOWN_PERIOD=30s
      - QUEUE_NAME=${QUEUE_NAME:-bataudit:events}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@bataudit.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      writer:
        condition: service_healthy
    restart: on-failure:3
    networks:
      - bataudit-slim
    deploy:
      resources:
        limits:
          cpus: "0.09"
          memory: 64M

volumes:
  slim_postgres_data:
    driver: local

networks:
  bataudit-slim:
    driver: bridge
